[Latest_Version]
Ver="v3.138.18-beta"
[Change_log]
log="\n- A lot improvements has been made in the latest version, please check online Change log page to learn more.\n\n- 您正在使用老旧版本, 建议立即更新. 最新版中已进行了很多改进, 包含新的超分辨率和补帧(插帧)技术. 请查阅在线更新日志页面以了解更多.\n\n- 您正在使用老舊版本, 建議立即更新. 最新版中已進行了很多改進, 包含新的超分辨率和補幀(插幀)技術. 請查閱在線更新日誌頁面以了解更多."
log_SimplifiedChinese="\n- 全新图片批量放大管线，性能提升超 300%。\n- 该更新目前仅支持 Waifu2x-NCNN-Vulkan 引擎，但后续将扩展到其他引擎。\n- 在 RTX 5060 笔记本电脑上进行的测试显示，326 张混合图片的处理时间从 3:50 降至仅 1:10。\n- 修复：提高了 [替换原文件] 选项的 I/O 鲁棒性。\n- 修复：某些电脑上因 MSI Afterburner 和 RTSS 导致的缩放引擎崩溃问题。（感谢 @GT500 报告此问题并协助测试）\n- 警告：\n- 使用 WAIFU2X-NCNN-VULKAN 引擎时，该全新管线将默认启用。\n- 这是一个 BETA 测试版本。请自行承担使用风险。\n- 如果在使用新管线时遇到问题，请在 GITHUB 提交反馈。\n\n更新日期: 2026年6月14日"
log_TraditionalChinese="\n- 全新圖片批次放大管線，效能提升超過 300%。\n- 此更新目前僅支援 Waifu2x-NCNN-Vulkan 引擎，但後續將擴充至其他引擎。\n- 在 RTX 5060 筆記型電腦上進行的測試顯示，326 張混合圖片的處理時間從 3:50 降至僅 1:10。\n- 修復：提升了 [取代原始檔案] 選項的 I/O 強健性。\n- 修復：部分電腦上因 MSI Afterburner 和 RTSS 導致的縮放引擎崩潰問題。（感謝 @GT500 回報此問題並協助測試）\n- 警告：\n- 使用 WAIFU2X-NCNN-VULKAN 引擎時，此全新管線將預設啟用。\n- 這是一個 BETA 測試版本。請自行承擔使用風險。\n- 如果在使用新管線時遇到問題，請在 GITHUB 或 PATREON 上提交意見反應。\n\n更新日期: 2026年6月14日"
log_English="\n- NEW Image Batch Upscale Pipeline, Over 300% Performance Boost.\n- The update currently only supports the Waifu2x-NCNN-Vulkan engine, but it will expand to other engines later.\n- Testing on an RTX 5060 Laptop dropped processing time for 326 mixed images from 3:50 down to just 1:10.\n- Fix: Improved I/O robustness for [Replace original file] option.\n- Fix: Upscaling engine crash caused by MSI Afterburner and RTSS on some PCs. (Thanks to @GT500 for reporting and assisting with testing)\n- WARNING:\n- THIS NEW PIPELINE WILL BE ENABLED BY DEFAULT WHEN USING THE WAIFU2X-NCNN-VULKAN ENGINE.\n- THIS IS A BETA RELEASE. USE IT AT YOUR OWN RISK.\n- PLEASE SEND FEEDBACK ON GITHUB OR PATREON IF YOU ENCOUNTER ISSUES WHILE USING THE NEW PIPELINE.\n\nRelease Date: June 14, 2026"
