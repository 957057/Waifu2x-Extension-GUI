[Latest_Version]
Ver="v3.139.12-beta"
[Change_log]
log="\n- A lot improvements has been made in the latest version, please check online Change log page to learn more.\n\n- 您正在使用老旧版本, 建议立即更新. 最新版中已进行了很多改进, 包含新的超分辨率和补帧(插帧)技术. 请查阅在线更新日志页面以了解更多.\n\n- 您正在使用老舊版本, 建議立即更新. 最新版中已進行了很多改進, 包含新的超分辨率和補幀(插幀)技術. 請查閱在線更新日誌頁面以了解更多."
log_SimplifiedChinese="\n- 新功能：右键上下文菜单中添加了快速访问日志文件夹的选项。\n- 修复了多处错误：\n- 现在在批处理过程中，源文件可以免受意外删除或覆盖。\n- 批处理现在具有容错能力：单个任务失败不再会中断整个工作流。\n- 修复了核心批处理计算逻辑，提高了空间估计的准确性和任务分组的合理性。\n- 提高了文件操作的兼容性，从而实现了更可靠的路径处理以及重名文件冲突的解决。\n- 修复了几处轻微的线程和缓存问题。\n\n更新日期: 2026年7月19日"
log_TraditionalChinese="\n- 新功能：右鍵快顯功能表中新增了快速存取記錄資料夾的選項。\n- 修復了多處錯誤：\n- 現在在批次處理過程中，來源檔案可免於遭受意外刪除或覆寫。\n- 批次處理現在具備容錯能力：單一任務失敗不再會中斷整個工作流程。\n- 修復了核心批次計算邏輯，提高了空間估計的準確性與任務分組的合理性。\n- 提高了檔案操作的相容性，以達到更可靠的路徑處理與重複檔名衝突的解決。\n- 修復了幾處輕微的執行緒與快取問題。\n\n更新日期: 2026年7月19日"
log_English="\n- NEW: Added quick access to the log folder via the right-click context menu.\n- Multiple bug fixes:\n- Source files are now protected from accidental deletion or overwriting during batch processing.\n- Batch processing is now fault-tolerant: one failed task no longer interrupts the entire workflow.\n- Fixed core batch calculation logic, improving space estimation accuracy and task grouping.\n- Improved file operation compatibility for more reliable path handling and duplicate filename resolution.\n- Fixed several minor threading and caching issues.\n\nRelease Date: July 19, 2026"
