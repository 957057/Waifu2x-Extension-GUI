[Latest_Version]
Ver="v3.139.01"
[Change_log]
log="\n- A lot improvements has been made in the latest version, please check online Change log page to learn more.\n\n- 您正在使用老旧版本, 建议立即更新. 最新版中已进行了很多改进, 包含新的超分辨率和补帧(插帧)技术. 请查阅在线更新日志页面以了解更多.\n\n- 您正在使用老舊版本, 建議立即更新. 最新版中已進行了很多改進, 包含新的超分辨率和補幀(插幀)技術. 請查閱在線更新日誌頁面以了解更多."
log_SimplifiedChinese="\n- 全新图片批量超分辨率流水线，性能提升超 300%。（可选 BETA 功能）\n- 在 RTX 5060 笔记本上使用 Waifu2x-NCNN 进行测试：\n- 326 张混合图片的出来时间从 3:50 大幅缩短至仅需 1:10。\n- 全新流水线目前支持所有 NCNN-Vulkan 引擎以及 Anime4K。\n- 图片与 GIF 的信息读取速度更快。\n- 修复：提高了 [替换原文件] 选项的 I/O 稳定性。\n- 修复：解决了在部分电脑上由 MSI Afterburner 和 RTSS 导致的超分辨率引擎崩溃问题。\n- （感谢 @GT500 的反馈及协助测试）\n- 相比 v3.138.18-beta 的变化：\n- 进一步扩展了全新图片超分辨率流水线。\n- 修复了多项错误。\n\n更新日期: 2026年7月2日"
log_TraditionalChinese="\n- 全新圖片批次超解析度流水線，效能提升超 300%。（可選 BETA 功能）\n- 在 RTX 5060 筆記型電腦上使用 Waifu2x-NCNN 進行測試：\n- 326 張混合圖片的處理時間從 3:50 大幅縮短至僅需 1:10。\n- 全新流水線目前支援所有 NCNN-Vulkan 引擎以及 Anime4K。\n- 圖片與 GIF 的資訊讀取速度更快。\n- 修復：提高了 [替換原檔案] 選項的 I/O 穩定性。\n- 修復：解決了在部分電腦上由 MSI Afterburner 和 RTSS 導致的超解析度引擎當機問題。\n- （感謝 @GT500 的回報及協助測試）\n- 相比 v3.138.18-beta 的變化：\n- 進一步擴充了全新圖片超解析度流水線。\n- 修復了多個錯誤。\n\n更新日期: 2026年7月2日"
log_English="\n- NEW Image Batch Upscale Pipeline, Over 300% Performance Boost.(Optional BETA Feature)\n- Testing on an RTX 5060 Laptop, using Waifu2x-NCNN:\n- Dropped processing time for 326 mixed pictures from 3:50 down to just 1:10.\n- The NEW Pipeline currently supports all NCNN-Vulkan engines plus Anime4K.\n- Faster info reading for pictures and GIF.\n- Fix: Improved I/O robustness for [Replace original file] option.\n- Fix: Upscaling engine crash caused by MSI Afterburner and RTSS on some PCs.\n- (Thanks to @GT500 for reporting and assisting with testing)\n- Compare to v3.138.18-beta:\n- Further Expansion of the New Image Upscaling Pipeline.\n- Multiple bug fixs.\n\nRelease Date: July 2, 2026"
