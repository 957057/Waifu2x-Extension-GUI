[Latest_Version]
Ver="v3.138.01"
[Change_log]
log="\n- A lot improvements has been made in the latest version, please check online Change log page to learn more.\n\n- 您正在使用老旧版本, 建议立即更新. 最新版中已进行了很多改进, 包含新的超分辨率和补帧(插帧)技术. 请查阅在线更新日志页面以了解更多.\n\n- 您正在使用老舊版本, 建議立即更新. 最新版中已進行了很多改進, 包含新的超分辨率和補幀(插幀)技術. 請查閱在線更新日誌頁面以了解更多."
log_SimplifiedChinese="\n- 新增: 西班牙语语言包。通过自动翻译软件自动生成并进行优化。\n- 在此处启用: 附加设置 > 语言 (右下角)。\n- 新功能: [记录日志到文件]。启用后，将自动保存所有控制台输出到日志文件中。\n- [记录日志到文件] 默认禁用。位置: 主页选项卡，右下角。\n- 新功能: 改进了硬件视频解码器和编码器的兼容性测试。\n- Waifu2x 现在将直接帮助您配置并启用硬件视频解码器和编码器，从而加快视频处理速度。\n- 如果您希望 waifu2x 自动帮助您启用这些选项，可以重新运行兼容性测试。\n- 与 BETA 版本相比，西班牙语语言包得到了进一步优化。\n\n更新日期: 2026年6月2日"
log_TraditionalChinese="\n- 新增: 西班牙語語言包。透過自動翻譯軟體自動生成並進行優化。\n- 於此處啟用: 附加設定 > 語言 (右下角)。\n- 新功能: [記錄日誌到檔案]。啟用後，將自動儲存所有控制台輸出至日誌檔案中。\n- [記錄日誌到檔案] 預設為停用。位置: 首頁分頁，右下角。\n- 新功能: 改善了硬體視訊解碼器與編碼器的相容性測試。\n- Waifu2x 現在將直接協助您設定並啟用硬體視訊解碼器及編碼器，進而加快視訊處理速度。\n- 若您希望 waifu2x 自動協助您啟用這些選項，可以重新執行相容性測試。\n- 與 BETA 版本相比，西班牙語語言包已獲得進一步優化。\n\n更新日期: 2026年6月2日"
log_English="\n- NEW: Spanish Language Pack. Auto-generated and refined via automated translation software.\n- Enable it at: Additional Settings > Language (bottom-right corner).\n- NEW Feature: [Log to file]. When enabled, auto saves all console output to log files.\n- [Log to file] is disabled by default. Location: Home Tab, bottom right.\n- NEW Feature: Improved Compatibility Test for HW Video Decoder & Encoder.\n- Waifu2x will now help you configure and enable HW video decoders & encoders directly, speeding up video processing.\n- You can re-run the compatibility test if you want waifu2x to automatically help you enable these options.\n- The Spanish Language Pack has been further refined compared to the BETA version.\n\nRelease Date: June 2, 2026"
